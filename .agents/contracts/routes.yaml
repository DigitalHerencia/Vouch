schema_version: "3.0.0"
contract_name: "routes"
product: "Vouch"
source_of_truth_date: "2026-05-12"

architecture_rule: "app/** is route shell only. Business logic belongs in features, fetchers, actions, transactions, integrations, auth, authz, schemas, and types."

required_route_surface:
  stripe_webhook:
    route: "/api/stripe/webhooks"
    file: "app/api/stripe/webhooks/route.ts"
    note: "Only external provider boundary route handler for Stripe webhooks."
  tenant:
    - route: "/dashboard"
      file: "app/(tenant)/dashboard/page.tsx"
    - route: "/setup"
      file: "app/(tenant)/setup/page.tsx"
    - route: "/settings/payment"
      file: "app/(tenant)/settings/payment/page.tsx"
    - route: "/settings/payout"
      file: "app/(tenant)/settings/payout/page.tsx"
    - route: "/settings/verification"
      file: "app/(tenant)/settings/verification/page.tsx"
    - route: "/vouches"
      file: "app/(tenant)/vouches/page.tsx"
    - route: "/vouches/new"
      file: "app/(tenant)/vouches/new/page.tsx"
    - route: "/vouches/[vouchId]"
      file: "app/(tenant)/vouches/[vouchId]/page.tsx"
    - route: "/vouches/[vouchId]/confirm"
      file: "app/(tenant)/vouches/[vouchId]/confirm/page.tsx"
  public:
    - route: "/vouches/invite/[token]"
      file: "app/(public)/vouches/invite/[token]/page.tsx"

forbidden_files:
  - "app/api/accounts/create/route.ts"
  - "app/api/accounts/session/route.ts"
  - "app/api/vouches/create/route.ts"
  - "app/api/vouches/confirm/route.ts"
  - "app/api/vouches/capture/route.ts"
  - "lib/stripe.ts"
  - "lib/db.ts"
  - "lib/types.ts"
  - "components/vouch-form.tsx"
  - "components/stripe-connect.tsx"
  - "components/confirmation-panel.tsx"

forbidden_route_patterns:
  - "/browse"
  - "/providers"
  - "/clients"
  - "/messages"
  - "/reviews"
  - "/ratings"
  - "/categories"
  - "/discover"
  - "/search"
  - "/book"
  - "/disputes"
  - "/claims"
  - "/appeals"
  - "/evidence"
  - "/admin/force-release"
  - "/admin/manual-award"
