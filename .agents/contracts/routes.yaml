schema_version: "2.0.0"
contract_name: "routes"
product: "Vouch"
source_of_truth_date: "2026-04-30"

route_placement:
  home:
    route: "/"
    file: "app/page.tsx"
    note: "The root marketing home page is intentionally implemented at app/page.tsx."

allowed_routes:
  public:
    - "/"
    - "/pricing"
    - "/faq"
    - "/legal/terms"
    - "/legal/privacy"
    - "/sign-in"
    - "/sign-up"
    - "/vouches/invite/[token]"
  tenant:
    - "/dashboard"
    - "/setup"
    - "/settings"
    - "/settings/payment"
    - "/settings/payout"
    - "/settings/verification"
    - "/vouches"
    - "/vouches/new"
    - "/vouches/[vouchId]"
    - "/vouches/[vouchId]/confirm"
  admin:
    - "/admin"
    - "/admin/vouches"
    - "/admin/vouches/[vouchId]"
    - "/admin/users"
    - "/admin/payments"
    - "/admin/audit"
    - "/admin/webhooks"
  api:
    - "/api/stripe/webhooks"
    - "/api/clerk/webhook-handler"
