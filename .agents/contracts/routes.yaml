schema_version: "2.0.0"
contract_name: "routes"
product: "Vouch"
source_of_truth_date: "2026-04-30"

allowed_routes:
  public:
    - "/"
    - "/how-it-works"
    - "/pricing"
    - "/faq"
    - "/legal/terms"
    - "/legal/privacy"
    - "/sign-in"
    - "/sign-up"
    - "/vouches/invite/[token]"
  tenant:
    - "/dashboard"
    - "/setup"
    - "/settings"
    - "/settings/payment"
    - "/settings/payout"
    - "/settings/verification"
    - "/vouches"
    - "/vouches/new"
    - "/vouches/[vouchId]"
    - "/vouches/[vouchId]/confirm"
  admin:
    - "/admin"
    - "/admin/vouches"
    - "/admin/vouches/[vouchId]"
    - "/admin/users"
    - "/admin/payments"
    - "/admin/audit"
    - "/admin/webhooks"
  api:
    - "/api/stripe/webhooks"
    - "/api/clerk/webhook-handler"

forbidden_routes:
  - "/browse"
  - "/providers"
  - "/clients"
  - "/messages"
  - "/reviews"
  - "/ratings"
  - "/categories"
  - "/discover"
  - "/search"
  - "/book"
  - "/disputes"
  - "/claims"

route_language:
  preferred_public_roles:
    creator: "merchant/provider"
    acceptor: "customer/client"
  legacy_internal_mapping:
    payer: "merchant/provider"
    payee: "customer/client"
