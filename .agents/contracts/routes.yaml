version: 1
name: vouch-routes-contract
authority: source-of-truth

route_doctrine:
  next_app_router: true
  routes_define_surface_area_not_business_truth: true
  pages_must_be_thin: true

allowed_route_tree:
  app:
    root:
      - app/layout.tsx
      - app/globals.css
      - app/page.tsx
      - app/loading.tsx
      - app/not-found.tsx
      - app/global-error.tsx
    public:
      - app/(public)/layout.tsx
      - app/(public)/loading.tsx
      - app/(public)/error.tsx
      - app/(public)/faq/page.tsx
      - app/(public)/pricing/page.tsx
      - app/(public)/legal/terms/page.tsx
      - app/(public)/legal/privacy/page.tsx
      - app/(public)/checkout/success/page.tsx
    auth:
      - app/(auth)/layout.tsx
      - app/(auth)/loading.tsx
      - app/(auth)/error.tsx
      - app/(auth)/sign-in/[[...sign-in]]/page.tsx
      - app/(auth)/sign-up/[[...sign-up]]/page.tsx
    tenant:
      - app/(tenant)/layout.tsx
      - app/(tenant)/loading.tsx
      - app/(tenant)/error.tsx
      - app/(tenant)/dashboard/page.tsx
      - app/(tenant)/vouches/new/page.tsx
      - app/(tenant)/vouches/new/confirm/page.tsx
      - app/(tenant)/vouches/[vouchId]/page.tsx
    api:
      - app/api/clerk/webhook-handler/route.ts
      - app/api/stripe/webhooks/route.ts

tenant_navigation:
  allowed:
    - label: Dashboard
      href: /dashboard
    - label: Vouches
      href: /vouches/new
    - label: Connect
      behavior: server_action_redirect_to_stripe_connect
    - label: Payment
      behavior: server_action_redirect_to_stripe_payment_management

forbidden_routes:
  - /setup
  - /settings
  - /settings/payment
  - /settings/payout
  - /settings/verification
  - /readiness
  - /account
  - /profile
  - /admin
  - /admin/settlement
  - /messages
  - /disputes
  - /claims
  - /appeals
  - /evidence
  - /reviews
  - /ratings
  - /search
  - /browse
  - /providers
  - /marketplace
  - /api/vouches/create
  - /api/vouches/confirm
  - /api/vouches/capture
  - /api/vouches/refund
  - /api/accounts/create
  - /api/accounts/session
  - /api/payment/setup
  - /api/payout/setup
  - /api/admin/settlement

app_route_allowed:
  - define_metadata
  - receive_params
  - receive_search_params
  - compose_one_page_level_feature
  - compose_static_shared_components
  - wrap_dynamic_content_in_suspense
  - provide_skeleton_fallback
  - redirect_when_required
  - hand_off_route_context
  - provider_webhook_handler_for_external_boundaries

app_route_forbidden:
  - prisma_query
  - stripe_sdk_call
  - clerk_business_logic
  - authz_enforcement
  - protected_dto_shaping
  - domain_mutation
  - provider_mutation
  - settlement_logic
  - webhook_reconciliation_logic
  - hard_coded_large_page_copy

api_route_policy:
  only_external_provider_boundaries: true
  internal_app_mutations_use_api_routes: false
  provider_routes_require_signature_verification: true
  provider_routes_require_user_session: false