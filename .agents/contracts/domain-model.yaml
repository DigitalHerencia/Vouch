schema_version: "3.0.0"
contract_name: "domain-model"
product: "Vouch"
source_of_truth_date: "2026-05-12"

summary:
  description: "Vouch is a narrow commitment-backed payment coordination system for pre-arranged appointments and in-person agreements."
  core_invariant: "both parties confirm presence within the confirmation window -> funds release; otherwise -> refund, void, or non-capture"
  outcome_rule: "Outcome follows system state."

non_goals:
  - "marketplace"
  - "broker"
  - "scheduler"
  - "messaging app"
  - "review system"
  - "dispute system"
  - "escrow provider"
  - "public directory"
  - "discovery platform"

global_invariants:
  - id: "dual_confirmation_only"
    rule: "Only both participants confirming presence within the confirmation window can satisfy release conditions."
  - id: "no_unilateral_release"
    rule: "No unilateral action releases funds."
  - id: "no_late_release"
    rule: "No late confirmation releases funds."
  - id: "no_admin_arbitration"
    rule: "Admin cannot arbitrate, manually award funds, force release, rewrite confirmation truth, or edit confirmation timestamps."
  - id: "no_dispute_surface"
    rule: "No dispute, claim, evidence, appeal, or adjudication surface exists."
  - id: "provider_backed_settlement"
    rule: "Payment readiness and settlement state are provider-backed and reconciled into Vouch DB."
  - id: "server_authoritative"
    rule: "Client state is never authoritative for readiness, fee math, confirmation, settlement, or lifecycle status."

participants:
  payer:
    description: "Participant who creates or funds a Vouch and must be ready to authorize payment."
    readiness_track: "payment"
    confirms_presence: true
  payee:
    description: "Participant who accepts or becomes bound as payee and must be ready to receive funds through Stripe Connect."
    readiness_track: "payout"
    confirms_presence: true

readiness:
  payer:
    required_for:
      - "creating a Vouch"
      - "funding a Vouch"
    gates:
      - "authenticated user"
      - "active Vouch account"
      - "adult/identity readiness when required"
      - "accepted terms"
      - "valid Stripe customer/payment method setup"
      - "payment readiness stored in Vouch DB as provider-backed readiness state"
  payee:
    required_for:
      - "accepting a Vouch"
      - "becoming bound as payee"
    gates:
      - "authenticated user"
      - "active Vouch account"
      - "adult/identity readiness when required"
      - "accepted terms"
      - "Stripe connected account exists"
      - "Stripe payout capability/readiness active or sufficient for the Vouch flow"
      - "payout readiness stored in Vouch DB as provider-backed readiness state"
  separation_rule: "Do not treat payer payment setup and payee payout setup as the same thing."

money:
  fee_module: "lib/vouch/fees.ts"
  fee_policy: "Vouch fee = max(5% of customer total, 500 cents)"
  payment_intent:
    amount: "customer total amount in cents"
    currency: "normalized supported currency"
    capture_method: "manual"
    application_fee_amount: "calculated Vouch fee"
    transfer_data_destination: "payee connected account id when destination charge is used"
    metadata: "safe Vouch references only"
  persisted_fields:
    - "customer total cents"
    - "application fee amount cents"
    - "payee receivable amount cents"
    - "Stripe PaymentIntent id"
    - "Stripe status"
    - "Stripe capture/refund/void reconciliation state"
    - "safe provider references only"

lifecycle_language:
  - "Draft / Created"
  - "Invite Sent"
  - "Accepted"
  - "Payment Authorized"
  - "Window Pending"
  - "Window Open"
  - "Payer Confirmed"
  - "Payee Confirmed"
  - "Both Confirmed"
  - "Release Processing"
  - "Completed"
  - "Expired"
  - "Voided"
  - "Refunded"
  - "Payment Failed"
  - "Release Failed"
  - "Refund Failed"
  - "Canceled"

language:
  use:
    - "payer"
    - "payee"
    - "participant"
    - "Vouch"
    - "commitment"
    - "confirmation window"
    - "presence confirmation"
    - "funds release"
    - "refund"
    - "void"
    - "non-capture"
    - "provider-backed settlement"
    - "deterministic resolution"
  avoid:
    - "marketplace"
    - "booking platform"
    - "escrow"
    - "broker"
    - "dispute"
    - "claim"
    - "appeal"
    - "evidence"
    - "review"
    - "rating"
    - "search"
    - "discovery"
    - "manual award"
    - "force release"

storage_rules:
  never_store:
    - "raw card data"
    - "raw bank data"
    - "raw identity documents"
    - "full provider payloads"
    - "sensitive KYC details"
  store_only:
    - "safe internal references"
    - "safe provider references"
    - "provider statuses"
    - "redacted/minimal webhook event records"
