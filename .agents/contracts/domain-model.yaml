version: 1
name: vouch-domain-model-contract
authority: source-of-truth

canonical_roles:
  - merchant
  - customer

role_aliases:
  merchant: payee
  customer: payer

role_rules:
  role_scope: per_vouch
  global_account_roles: false
  same_user_multiple_roles_across_vouches: true

merchant:
  definition: creator_and_intended_recipient
  may:
    - create_vouch
    - review_vouch_terms
    - accept_per_vouch_disclaimer
    - commit_vouch
    - share_stripe_checkout_link_externally
    - hold_vouch_unused
    - let_vouch_expire_unused
    - open_vouch_detail
    - confirm_presence_inside_window
    - archive_from_dashboard
    - receive_settlement_after_bilateral_confirmation
  may_not:
    - edit_committed_vouch
    - cancel_committed_vouch
    - unsend_committed_vouch
    - rewrite_terms
    - change_amount
    - change_appointment_date
    - change_confirmation_window
    - replace_customer
    - force_settlement
    - force_refund
    - manually_award_funds
    - rewrite_confirmation_truth
    - override_provider_state
    - create_dispute
    - submit_evidence
    - appeal_outcome

customer:
  definition: paying_participant_and_presence_confirmer
  may:
    - open_authorization_link
    - authenticate
    - accept_required_terms
    - complete_stripe_checkout_authorization
    - open_vouch_detail
    - review_vouch_state
    - confirm_presence_inside_window
    - archive_from_dashboard
  may_not:
    - edit_vouch
    - change_amount
    - change_appointment_date
    - change_confirmation_window
    - force_settlement
    - force_refund
    - trigger_release_alone
    - rewrite_confirmation_truth
    - create_dispute
    - submit_evidence
    - appeal_outcome

vouch_lifecycle:
  canonical:
    - draft
    - committed
    - sent
    - accepted
    - authorized
    - confirmable
    - completed
    - expired
  terminal:
    - completed
    - expired
  forbidden_lifecycle_values:
    - refunded
    - voided
    - canceled
    - failed
    - provider_blocked
    - archived
    - reconciliation_pending
    - recovery_required

state_axes:
  vouch_lifecycle:
    - draft
    - committed
    - sent
    - accepted
    - authorized
    - confirmable
    - completed
    - expired
  confirmation:
    - none_confirmed
    - merchant_confirmed
    - customer_confirmed
    - both_confirmed
  payment_provider:
    - not_started
    - checkout_created
    - requires_payment_method
    - requires_capture
    - authorized
    - capture_processing
    - captured
    - canceled
    - expired
    - failed
  settlement:
    - pending
    - non_capture_pending
    - non_captured
    - capture_pending
    - captured
    - refund_pending
    - refunded
    - provider_blocked
    - failed
  archive:
    - active
    - archived
  recovery:
    - normal
    - recovery_required
    - recovery_in_progress
    - recovered
    - recovery_failed

confirmation:
  allowed_methods:
    - code_exchange
    - offline_code_exchange
  forbidden_methods:
    - gps
    - manual
    - system
    - screenshot
    - evidence
    - support_override
  rules:
    - each_participant_confirms_only_for_self
    - confirmation_inside_window_required
    - duplicate_confirmation_rejected
    - one_sided_confirmation_never_releases_funds
    - late_confirmation_never_releases_funds
    - code_generation_alone_does_not_change_state
    - bilateral_successful_verification_required_for_settlement_evaluation

immutability:
  draft_mutable: true
  committed_and_later_immutable: true
  completed_terminal: true
  expired_terminal: true
  user_cancel_after_commit_allowed: false
  user_edit_after_commit_allowed: false
  support_override_allowed: false
