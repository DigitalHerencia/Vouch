schema_version: "3.0.0"
contract_name: "roles"
product: "Vouch"
source_of_truth_date: "2026-05-12"

roles:
  payer:
    description: "Participant who creates or funds the Vouch and must be ready to authorize payment."
    readiness: "payment"
    stripe_track: "Stripe customer/payment method setup"
    allowed_actions:
      - "create Vouch when readiness gates pass"
      - "fund Vouch when readiness gates pass"
      - "confirm presence during confirmation window"
    forbidden_actions:
      - "release funds alone"
      - "confirm outside window"
      - "rewrite payee confirmation"
  payee:
    description: "Participant who accepts or becomes bound as payee and must be ready to receive funds through Stripe Connect."
    readiness: "payout"
    stripe_track: "Stripe connected account payout readiness"
    allowed_actions:
      - "accept valid invitation when readiness gates pass"
      - "decline valid invitation"
      - "confirm presence during confirmation window"
    forbidden_actions:
      - "release funds alone"
      - "confirm outside window"
      - "override payout readiness"
  admin:
    description: "Operational observer and safe retry actor only."
    allowed_actions:
      - "inspect safe status"
      - "inspect safe provider reference"
      - "inspect audit trail"
      - "inspect webhook status"
      - "retry safe idempotent provider operations where contracts allow"
    forbidden_actions:
      - "arbitrate"
      - "collect evidence"
      - "manual award"
      - "force release"
      - "confirmation truth rewrite"
      - "confirmation timestamp edit"

participant_terms:
  canonical:
    - "payer"
    - "payee"
    - "participant"
  forbidden_for_new_product_copy:
    - "merchant marketplace"
    - "provider listing"
    - "customer/provider marketplace"
    - "booking platform"
    - "escrow"
    - "broker"
