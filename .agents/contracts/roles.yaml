schema_version: "2.0.0"
contract_name: "roles"
product: "Vouch"
source_of_truth_date: "2026-04-30"

legacy_mapping:
  payer: "merchant / provider / creator"
  payee: "customer / client / paying acceptor"

roles:
  merchant_provider:
    description: "Creates a Vouch and receives protectedAmountCents on successful release."
    legacy_internal_role: "payer"
    allowed_capabilities:
      - "create_vouch"
      - "send_invite"
      - "read_created_vouch"
      - "confirm_presence_as_merchant_provider"
      - "cancel_pending_vouch_when_allowed"
    denied_capabilities:
      - "accept_own_vouch"
      - "manual_award_funds"
      - "override_confirmation"
  customer_client:
    description: "Accepts a Vouch and pays customerTotalCents."
    legacy_internal_role: "payee"
    allowed_capabilities:
      - "accept_invited_vouch"
      - "read_accepted_vouch"
      - "confirm_presence_as_customer_client"
    denied_capabilities:
      - "change_merchant_destination"
      - "set_pricing"
      - "manual_release_funds"
  invited_customer_candidate:
    description: "May view token-limited Vouch summary before acceptance."
    legacy_internal_role: "invited_payee_candidate"
    allowed_capabilities:
      - "read_invite_summary"
      - "accept_vouch_if_eligible"
      - "decline_vouch"
  admin:
    description: "Operational inspection and safe idempotent retries only."
    allowed_capabilities:
      - "read_admin_operational_state"
      - "read_users"
      - "read_payments"
      - "read_webhooks"
      - "read_audit"
      - "retry_safe_technical_operation"
    denied_capabilities:
      - "award_funds"
      - "resolve_dispute"
      - "decide_winner"
      - "override_confirmation"
      - "force_complete_without_required_provider_state"
