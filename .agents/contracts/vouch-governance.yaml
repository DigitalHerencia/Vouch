version: 1
status: active
supersedes:
  - old .codex governance
  - marketplace-style settlement assumptions
  - destination-charge deposit assumptions
  - application-fee deposit assumptions

truth_order:
  - .agents/docs/*.md
  - .agents/contracts/*.yaml
  - .agents/instructions/*.instructions.md
  - existing code
  - implementation judgment

product:
  category: b2b_saas_protocol
  launch_region: US
  platform_customer: business
  connected_merchant: business
  connected_merchant_user_owned: true
  merchant_of_record: connected_business
  negative_balance_liability: connected_business
  customer_deposit_owner: connected_business
  platform_handles_deposit_funds: false
  platform_mediates_service_disputes: false

stripe:
  account_api_generation: accounts_v2
  connected_account_configurations:
    - merchant
    - customer
  onboarding: stripe_hosted
  dashboard_access: full
  service_agreement: full
  charge_type_for_customer_deposit: direct_charge
  capture_method_for_customer_deposit: manual
  platform_fee_model: separate_one_time_non_refundable_protocol_fee
  platform_fee_account: platform
  deposit_account: connected_account
  application_fee_on_deposit: forbidden
  transfer_data_destination_on_deposit: forbidden
  destination_charges_for_deposit: forbidden
  separate_charges_and_transfers_for_deposit: forbidden
  payouts: automatic
  verification: upfront
  bypass_required_verification: forbidden
  pricing: stripe_owned
  platform_customer_payment_method_required: true
  platform_customer_reusable_payment_method_types: stripe_supported
  connect_onboarding_satisfies_platform_payment_method_readiness: false
  sandbox_lifecycle_must_pass_before_live_configuration: true
  live_mutation_requires_explicit_user_approval: true

readiness:
  dashboard:
    requires:
      - platform_customer_reusable_payment_method
    blocked_behavior:
      - show_payment_method_requirement
      - disable_operational_interactivity
  new_vouch_form:
    requires:
      - connected_account_onboarding_complete
      - connected_account_charge_capability
      - connected_account_payout_capability
    blocked_behavior:
      - show_connected_account_requirement
      - disable_form_interactivity

vouch_creation:
  wizard_steps:
    - per_vouch_disclaimer
    - appointment_and_amount
    - review_and_protocol_fee
  disclaimer_scope: per_vouch
  disclaimer_persisted: true
  maximum_appointment_lead_time_hours: 24
  appointment_must_be_future: true
  confirmation_window_before_appointment_minutes: 60
  confirmation_window_after_appointment_minutes: 60
  protocol_fee_checkout_account: platform
  protocol_fee_required_before_customer_authorization_link: true

customer_authorization:
  charge_account: connected_account
  charge_type: direct_charge
  capture_method: manual
  link_associated_with_vouch_public_id: true
  deadline: appointment_timestamp
  authorization_after_appointment: forbidden
  first_time_customer_saves_payment_method: true
  completed_checkout_claim_associates_customer_to_vouch: true

confirmation:
  required_participants:
    - merchant
    - customer
  server_received_inside_window_required: true
  second_valid_confirmation_triggers_immediate_capture: true
  normal_capture_depends_on_cron: false
  codes_available_only_inside_window: true
  controls_interactive_only_inside_window: true
  offline_capture: forbidden
  late_confirmation: forbidden
  capture_without_bilateral_valid_confirmation: forbidden
  capture_after_window_close: forbidden

reconciliation:
  role: recovery_and_stale_state_cleanup_only
  mvp_schedule: once_daily
  may_grant_capture_eligibility: false
  normal_capture_dependency: forbidden
  technical_capture_retry_requires_bilateral_in_window_confirmation: true
  technical_recovery_cutoff: appointment_plus_24_hours
  capture_after_technical_recovery_cutoff: forbidden
  allowed_operations:
    - retry_eligible_technical_capture_failure
    - synchronize_provider_state
    - expire_stale_vouch
    - cancel_or_reconcile_stale_authorization

environments:
  development:
    app_url: http://localhost:3000
    stripe_account: vouch_sandbox
    canonical_entrypoint: pnpm_dev
    clerk_environment: development
    clerk_webhook_ingress: ngrok
    clerk_webhook_command: ngrok_http_named_domain_port_3000
    stripe_webhook_ingress: stripe_cli_listener
    stripe_webhook_command: stripe_listen_forward_to_localhost_3000_api_stripe_webhooks
  production:
    app_url: https://usevouch.vercel.app
    stripe_account: vouch_live
    clerk_environment: production
    deployment_branch: main
  preview:
    enabled: false
  stripe_testing:
    runtime_environment: none
    use_requires_explicit_user_approval: true
  secrets_shared_between_development_and_production: forbidden
  clerk_env_mutation_requires_explicit_user_approval: true
  neon_development_branch_creation_requires_explicit_user_approval: true

clerk:
  owns:
    - authentication
    - sessions
    - identity_events
  does_not_own:
    - product_state
    - payment_state
    - deposit_state
    - confirmation_state
    - authorization_state
  local_user_sync_required: true
  webhook_verification: svix
  organizations_default: false
  metadata_as_source_of_truth: forbidden

database:
  owns:
    - local_users
    - merchants
    - memberships
    - roles
    - stripe_ids
    - platform_fee_state
    - deposit_state
    - confirmation_state
    - webhook_idempotency
    - idempotency_keys
    - readiness_state
    - recovery_snapshots
    - operational_retries
  prisma_models_leak_to_ui: forbidden

server_action_order:
  - authenticate
  - authorize
  - zod_parse
  - transaction_or_provider_write
  - audit_or_log
  - revalidate_or_redirect

forbidden_product_surfaces:
  - scheduling
  - marketplace
  - browse
  - provider_directory
  - public_profiles
  - messaging
  - reviews
  - ratings
  - reputation
  - disputes
  - appeals
  - evidence_uploads
  - manual_release_overrides
  - admin_fund_awards

forbidden_routes:
  - /browse
  - /providers
  - /messages
  - /reviews
  - /categories
  - /disputes

architecture_boundaries:
  app:
    allowed:
      - route_shells
      - metadata
      - suspense_composition
    forbidden:
      - prisma
      - stripe_sdk
      - business_logic
  features:
    allowed:
      - view_orchestration
      - form_assembly
      - fetcher_action_handoff
  components:
    allowed:
      - presentational_ui
    forbidden:
      - protected_fetching
      - prisma
      - stripe_sdk
      - clerk_server_helpers
      - domain_truth
  lib:
    allowed:
      - auth
      - authz
      - db
      - actions
      - fetchers
      - integrations
      - webhooks
      - cache
      - audit

validation_policy:
  package_manager: pnpm
  default_for_agents: narrowest_relevant
  do_not_run_when_user_says_no_validation: true
