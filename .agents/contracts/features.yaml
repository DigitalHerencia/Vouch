schema_version: "3.0.0"
contract_name: "features"
product: "Vouch"
source_of_truth_date: "2026-05-12"

feature_surface:
  dashboard:
    files:
      - "features/dashboard/dashboard-page.tsx"
  setup:
    files:
      - "features/setup/setup-page.tsx"
      - "features/setup/setup-progress-panel.tsx"
      - "features/setup/setup-blocked-panel.tsx"
      - "features/setup/setup-return-context-banner.tsx"
      - "features/setup/terms-acceptance-panel.tsx"
      - "features/setup/terms-acceptance-dialog.client.tsx"
  settings:
    files:
      - "features/settings/payment-settings-page.tsx"
      - "features/settings/payout-settings-page.tsx"
      - "features/settings/verification-settings-page.tsx"
  payments:
    files:
      - "features/payments/payment-setup-page.tsx"
      - "features/payments/payout-setup-page.tsx"
      - "features/payments/payment-method-ready-state.tsx"
      - "features/payments/payout-ready-state.tsx"
      - "features/payments/payout-restricted-state.tsx"
  vouch_create:
    directory: "features/vouches/create"
    required_behaviors:
      - "server-owned fee calculation"
      - "payer readiness enforcement"
      - "manual-capture PaymentIntent creation through integration module"
      - "typed ActionResult returns"
  vouch_invite:
    directory: "features/vouches/invite"
    required_behaviors:
      - "invitation state verification"
      - "self-acceptance denial"
      - "payee readiness enforcement"
      - "no release or presence confirmation during accept"
  vouch_detail:
    directory: "features/vouches/detail"
    required_visible_fields:
      - "amount"
      - "status"
      - "required action"
      - "deadline/window"
      - "consequence"
  vouch_confirm:
    directory: "features/vouches/confirm"
    required_behaviors:
      - "active participant authorization"
      - "window-open enforcement"
      - "duplicate confirmation rejection"
      - "both-confirmed settlement only"

component_surface:
  payments:
    directory: "components/payments"
    rule: "Pure reusable UI only. No protected fetching, Stripe mutation, authz enforcement, or raw provider payload exposure."
  vouches:
    directory: "components/vouches"
    rule: "Pure reusable UI only. No protected fetching, domain mutation, or hidden settlement logic."

forbidden_features:
  - "public profiles"
  - "provider listings"
  - "browse/discover/search"
  - "categories"
  - "recommendations"
  - "featured provider blocks"
  - "ratings"
  - "reviews"
  - "messaging"
  - "disputes"
  - "claims"
  - "evidence uploads"
  - "appeals"
  - "manual award"
  - "force release"
  - "admin confirmation timestamp editing"
