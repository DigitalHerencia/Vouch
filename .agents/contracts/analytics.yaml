# `.agents/contracts/analytics.yaml`

```yaml
schema_version: "1.0.0"
contract_name: "analytics"
product: "Vouch"

summary:
    description: "Analytics event contract for Vouch product, lifecycle, conversion, and operational metrics."

analytics_principles:
    - id: "track_lifecycle_truth"
      rule: "Analytics should reflect domain events and product funnel state, not unstructured behavioral surveillance."

    - id: "privacy_minimization"
      rule: "Do not track raw identity documents, card data, detailed meeting purpose, precise location history, or private provider payloads."

    - id: "no_marketplace_analytics"
      rule: "Do not introduce analytics concepts for discovery, rankings, reviews, profiles, categories, or recommendations."

    - id: "audit_is_not_analytics"
      rule: "Audit events are source-of-truth operational records. Analytics events are aggregate product measurement records."

global_properties:
    required:
        event_id:
            type: "string"
        event_name:
            type: "string"
        occurred_at:
            type: "datetime"
        environment:
            type: "string"
            allowed_values:
                - "development"
                - "preview"
                - "production"
        app_version:
            type: "string"
            required: false
        user_id:
            type: "string"
            required: false
            pseudonymous: true
        session_id:
            type: "string"
            required: false
            pseudonymous: true
        request_id:
            type: "string"
            required: false

    prohibited:
        - "raw_card_data"
        - "raw_identity_documents"
        - "full_payment_provider_payload"
        - "full_webhook_payload"
        - "precise_location_history"
        - "meeting_purpose_free_text"
        - "private_messages"
        - "user_review_text"
        - "service_category"

event_groups:
    acquisition:
        description: "Public marketing and signup funnel."
        events:
            - name: "marketing.page_viewed"
              properties:
                  page_id:
                      type: "string"
                      required: true
                  path:
                      type: "string"
                      required: true
                  referrer_domain:
                      type: "string"
                      required: false

            - name: "marketing.cta_clicked"
              properties:
                  cta_id:
                      type: "string"
                      required: true
                  page_id:
                      type: "string"
                      required: true
                  destination:
                      type: "string"
                      required: false

            - name: "auth.sign_up_started"
              properties:
                  entry_context:
                      type: "string"
                      required: false
                      allowed_values:
                          - "landing"
                          - "invite"
                          - "create_vouch"
                          - "dashboard"
                          - "unknown"

            - name: "auth.sign_up_completed"
              properties:
                  entry_context:
                      type: "string"
                      required: false
                  user_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "auth.sign_in_completed"
              properties:
                  entry_context:
                      type: "string"
                      required: false

    setup:
        description: "User readiness and setup funnel."
        events:
            - name: "setup.checklist_viewed"
              properties:
                  missing_requirements:
                      type: "string_array"
                      required: true

            - name: "setup.verification_started"
              properties:
                  provider:
                      type: "string"
                      required: true

            - name: "setup.verification_completed"
              properties:
                  identity_status:
                      type: "verification_status"
                      required: true
                  adult_status:
                      type: "verification_status"
                      required: true

            - name: "setup.verification_failed"
              properties:
                  failure_code:
                      type: "string"
                      required: false

            - name: "setup.payment_started"
              properties:
                  provider:
                      type: "string"
                      required: true

            - name: "setup.payment_ready"
              properties:
                  provider:
                      type: "string"
                      required: true

            - name: "setup.payout_started"
              properties:
                  provider:
                      type: "string"
                      required: true

            - name: "setup.payout_ready"
              properties:
                  provider:
                      type: "string"
                      required: true

            - name: "setup.terms_accepted"
              properties:
                  terms_version:
                      type: "string"
                      required: true

    vouch:
        description: "Core Vouch lifecycle analytics."
        events:
            - name: "vouch.create_started"
              properties:
                  entry_context:
                      type: "string"
                      required: false
                  setup_blocked:
                      type: "boolean"
                      required: true

            - name: "vouch.create_submitted"
              properties:
                  amount_bucket:
                      type: "string"
                      required: true
                  currency:
                      type: "string"
                      required: true
                  recipient_method:
                      type: "string"
                      required: true
                      allowed_values:
                          - "email"
                          - "share_link"

            - name: "vouch.created"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  amount_cents:
                      type: "integer"
                      required: true
                  currency:
                      type: "string"
                      required: true
                  platform_fee_cents:
                      type: "integer"
                      required: true
                  confirmation_window_minutes:
                      type: "integer"
                      required: true

            - name: "vouch.invite_copied"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "vouch.invite_sent"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  channel:
                      type: "notification_channel"
                      required: true

            - name: "vouch.invite_opened"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  authenticated:
                      type: "boolean"
                      required: true

            - name: "vouch.accept_started"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  setup_blocked:
                      type: "boolean"
                      required: true

            - name: "vouch.accepted"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  time_to_accept_minutes:
                      type: "integer"
                      required: false

            - name: "vouch.declined"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "vouch.canceled"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  status_before_cancel:
                      type: "vouch_status"
                      required: true

            - name: "vouch.confirmation_window_opened"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "vouch.confirmation_submitted"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  participant_role:
                      type: "participant_role"
                      required: true
                  method:
                      type: "string"
                      required: true
                      allowed_values:
                          - "manual"
                          - "gps"
                          - "system"

            - name: "vouch.partially_confirmed"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  confirmed_role:
                      type: "participant_role"
                      required: true

            - name: "vouch.completed"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  amount_cents:
                      type: "integer"
                      required: true
                  platform_fee_cents:
                      type: "integer"
                      required: true
                  time_to_complete_minutes:
                      type: "integer"
                      required: false

            - name: "vouch.expired"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  aggregate_confirmation_status:
                      type: "aggregate_confirmation_status"
                      required: true

            - name: "vouch.refunded"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  refund_reason:
                      type: "string"
                      required: true

            - name: "vouch.failed"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  failure_code:
                      type: "string"
                      required: false
                  failure_stage:
                      type: "string"
                      required: true
                      allowed_values:
                          - "create"
                          - "accept"
                          - "confirm"
                          - "release"
                          - "refund"
                          - "webhook"
                          - "unknown"

    payment:
        description: "Payment lifecycle analytics."
        events:
            - name: "payment.initialized"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  provider:
                      type: "string"
                      required: true
                  amount_cents:
                      type: "integer"
                      required: true
                  platform_fee_cents:
                      type: "integer"
                      required: true

            - name: "payment.authorized"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  provider:
                      type: "string"
                      required: true

            - name: "payment.release_requested"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  provider:
                      type: "string"
                      required: true

            - name: "payment.released"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  provider:
                      type: "string"
                      required: true
                  amount_cents:
                      type: "integer"
                      required: true

            - name: "payment.refund_requested"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  reason:
                      type: "string"
                      required: true

            - name: "payment.refunded"
              properties:
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  amount_cents:
                      type: "integer"
                      required: true

            - name: "payment.failed"
              properties:
                  vouch_id:
                      type: "string"
                      required: false
                      pseudonymous: true
                  failure_code:
                      type: "string"
                      required: false
                  failure_stage:
                      type: "string"
                      required: true

    notifications:
        description: "Notification delivery analytics."
        events:
            - name: "notification.queued"
              properties:
                  notification_type:
                      type: "string"
                      required: true
                  channel:
                      type: "notification_channel"
                      required: true

            - name: "notification.sent"
              properties:
                  notification_type:
                      type: "string"
                      required: true
                  channel:
                      type: "notification_channel"
                      required: true

            - name: "notification.failed"
              properties:
                  notification_type:
                      type: "string"
                      required: true
                  channel:
                      type: "notification_channel"
                      required: true
                  failure_code:
                      type: "string"
                      required: false

    admin:
        description: "Operational analytics."
        events:
            - name: "admin.dashboard_viewed"
              properties:
                  admin_user_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "admin.vouch_viewed"
              properties:
                  admin_user_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  vouch_id:
                      type: "string"
                      required: true
                      pseudonymous: true

            - name: "admin.safe_retry_started"
              properties:
                  admin_user_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  operation_type:
                      type: "string"
                      required: true

            - name: "admin.safe_retry_completed"
              properties:
                  admin_user_id:
                      type: "string"
                      required: true
                      pseudonymous: true
                  operation_type:
                      type: "string"
                      required: true
                  result:
                      type: "string"
                      required: true
                      allowed_values:
                          - "success"
                          - "failed"
                          - "skipped"

funnels:
    payer_activation:
        description: "Measures payer path from interest to created Vouch."
        steps:
            - "marketing.page_viewed"
            - "marketing.cta_clicked"
            - "auth.sign_up_completed"
            - "setup.verification_completed"
            - "setup.payment_ready"
            - "setup.terms_accepted"
            - "vouch.created"

    payee_activation:
        description: "Measures payee invite path from invite opened to accepted Vouch."
        steps:
            - "vouch.invite_opened"
            - "auth.sign_up_completed"
            - "setup.verification_completed"
            - "setup.payout_ready"
            - "setup.terms_accepted"
            - "vouch.accepted"

    vouch_completion:
        description: "Measures full Vouch lifecycle."
        steps:
            - "vouch.created"
            - "vouch.accepted"
            - "vouch.confirmation_submitted:payer"
            - "vouch.confirmation_submitted:payee"
            - "vouch.completed"

    failed_confirmation:
        description: "Measures Vouches that do not complete due to missing confirmation."
        steps:
            - "vouch.created"
            - "vouch.accepted"
            - "vouch.expired"
            - "vouch.refunded"

metrics:
    core:
        - id: "vouches_created"
          event: "vouch.created"
          aggregation: "count"

        - id: "vouches_accepted"
          event: "vouch.accepted"
          aggregation: "count"

        - id: "vouches_completed"
          event: "vouch.completed"
          aggregation: "count"

        - id: "vouches_expired"
          event: "vouch.expired"
          aggregation: "count"

        - id: "vouches_refunded"
          event: "vouch.refunded"
          aggregation: "count"

        - id: "completion_rate"
          formula: "vouches_completed / vouches_accepted"

        - id: "refund_rate"
          formula: "vouches_refunded / vouches_created"

        - id: "acceptance_rate"
          formula: "vouches_accepted / vouches_created"

        - id: "average_vouch_value"
          event: "vouch.created"
          property: "amount_cents"
          aggregation: "avg"

        - id: "gross_committed_volume"
          event: "vouch.created"
          property: "amount_cents"
          aggregation: "sum"

        - id: "gross_completed_volume"
          event: "vouch.completed"
          property: "amount_cents"
          aggregation: "sum"

        - id: "platform_fee_revenue"
          event: "vouch.completed"
          property: "platform_fee_cents"
          aggregation: "sum"

    operational:
        - id: "payment_failure_rate"
          formula: "payment.failed / payment.initialized"

        - id: "verification_dropoff_rate"
          formula: "setup.verification_started - setup.verification_completed"

        - id: "payout_setup_dropoff_rate"
          formula: "setup.payout_started - setup.payout_ready"

        - id: "payment_setup_dropoff_rate"
          formula: "setup.payment_started - setup.payment_ready"

        - id: "notification_failure_rate"
          formula: "notification.failed / notification.queued"

retention_events:
    - "vouch.created"
    - "vouch.accepted"
    - "vouch.completed"

blocked_analytics:
    - id: "provider_profile_views"
      reason: "Profiles are prohibited."
    - id: "search_queries"
      reason: "Discovery/search is prohibited."
    - id: "review_submitted"
      reason: "Reviews are prohibited."
    - id: "message_sent"
      reason: "Messaging is prohibited."
    - id: "category_selected"
      reason: "Marketplace categories are prohibited."
    - id: "dispute_opened"
      reason: "Dispute workflows are prohibited."
```

---
