schema_version: "2.0.0"
contract_name: "analytics"
product: "Vouch"
source_of_truth_date: "2026-04-30"

principles:
  - "Track funnel, lifecycle, setup, payment, and operational events only."
  - "Do not track raw card data, identity documents, full provider payloads, detailed meeting purpose, private messages, reviews, ratings, categories, or marketplace behavior."

legacy_mapping:
  payer: "merchant / provider / creator"
  payee: "customer / client / paying acceptor"

event_groups:
  acquisition:
    events:
      - "marketing.viewed"
      - "sign_up.started"
  setup:
    events:
      - "merchant_provider.payout_setup_started"
      - "merchant_provider.payout_ready"
      - "customer_client.payment_setup_started"
      - "customer_client.payment_ready"
      - "terms.accepted"
  vouch:
    events:
      - "vouch.created_by_merchant_provider"
      - "vouch.invite_sent"
      - "vouch.accepted_by_customer_client"
      - "vouch.declined_by_customer_client"
      - "vouch.confirmation_submitted:merchant_provider"
      - "vouch.confirmation_submitted:customer_client"
      - "vouch.completed"
      - "vouch.expired"
      - "vouch.refunded"
      - "vouch.canceled"
      - "vouch.failed"
  payment:
    events:
      - "payment.initialized"
      - "payment.authorized"
      - "payment.captured"
      - "payment.released"
      - "payment.voided"
      - "payment.refunded"
      - "payment.failed"
      - "payment.webhook_processed"
  admin:
    events:
      - "admin.operational_viewed"
      - "admin.safe_retry_started"
      - "admin.safe_retry_completed"
