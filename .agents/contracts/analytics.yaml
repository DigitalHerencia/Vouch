schema_version: "3.0.0"
contract_name: "analytics"
product: "Vouch"
source_of_truth_date: "2026-05-12"

principles:
  - "Analytics must support operational reliability, readiness, and deterministic lifecycle understanding."
  - "Analytics must not create marketplace, discovery, reputation, dispute, or arbitration behavior."
  - "Analytics must not store raw provider payloads, sensitive KYC details, raw payment data, or evidence."

allowed_events:
  - "page_view"
  - "setup_gate_viewed"
  - "payment_readiness_refreshed"
  - "payout_readiness_refreshed"
  - "vouch_created"
  - "vouch_invite_sent"
  - "vouch_accepted"
  - "vouch_declined"
  - "presence_confirmation_recorded"
  - "release_processing_started"
  - "vouch_completed"
  - "vouch_expired"
  - "payment_voided"
  - "payment_refunded"
  - "payment_failed"
  - "release_failed"
  - "refund_failed"
  - "webhook_received"
  - "webhook_processed"
  - "safe_retry_attempted"

forbidden_events:
  - "provider_profile_viewed"
  - "search_performed"
  - "rating_submitted"
  - "review_submitted"
  - "message_sent"
  - "dispute_opened"
  - "claim_submitted"
  - "evidence_uploaded"
  - "appeal_submitted"
  - "manual_award_created"
  - "force_release_clicked"

payload_rules:
  allowed:
    - "safe internal ids"
    - "safe provider references"
    - "status values"
    - "readiness state"
    - "lifecycle state"
    - "coarse timestamps"
  forbidden:
    - "raw card data"
    - "raw bank data"
    - "raw identity documents"
    - "full provider payloads"
    - "sensitive KYC details"
    - "stories"
    - "screenshots"
    - "evidence"
