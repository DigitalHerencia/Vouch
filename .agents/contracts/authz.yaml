schema_version: "2.0.0"
contract_name: "authz"
product: "Vouch"
source_of_truth_date: "2026-04-30"

default_policy: "deny"

legacy_mapping:
  payer: "provider / merchant / creator"
  payee: "customer / client / paying acceptor"

principles:
  - id: "participant_scope"
    rule: "A user may access a Vouch only when they are the merchant/provider creator, accepted customer/client, valid invite candidate, or admin."
  - id: "self_acceptance_denied"
    rule: "The merchant/provider creator may not accept their own Vouch as the customer/client."
  - id: "server_authoritative"
    rule: "Client-reported role, payment status, connected account, customer total, or confirmation eligibility is never trusted."
  - id: "admin_no_arbitration"
    rule: "Admins may inspect operational state and run safe idempotent retries only; they may not award funds, override confirmation truth, or decide disputes."

capabilities:
  create_vouch:
    actor: "merchant_provider"
    requirements:
      - "authenticated"
      - "active user"
      - "identity/adult requirements satisfied where enabled"
      - "payout readiness satisfied for merchant/provider"
      - "terms accepted"
      - "pricing calculated server-side"
  accept_vouch:
    actor: "customer_client"
    requirements:
      - "authenticated"
      - "active user"
      - "valid invite token or recipient constraint"
      - "Vouch.status == pending"
      - "customer/client is not the merchant/provider creator"
      - "payment readiness satisfied for customer/client"
      - "terms accepted"
  initialize_payment:
    actor: "system"
    requirements:
      - "Vouch has merchant/provider connected account"
      - "customer/client has provider customer/payment method when required"
      - "PaymentIntent amount == customerTotalCents"
      - "application_fee_amount == applicationFeeAmountCents"
      - "transfer destination == merchant/provider connected account"
  confirm_presence:
    actor: "participant"
    requirements:
      - "authenticated"
      - "active user"
      - "Vouch.status == active"
      - "confirmation window is open"
      - "user is merchant/provider creator or accepted customer/client"
      - "participant has not already confirmed"
  read_admin_operational_state:
    actor: "admin"
    requirements:
      - "admin capability"
      - "operational inspection only"
      - "no arbitration controls"
