schema_version: "3.0.0"
contract_name: "authz"
product: "Vouch"
source_of_truth_date: "2026-05-12"

default_policy: "deny"

protected_fetcher_sequence:
  - "authenticate"
  - "authorize"
  - "minimal select"
  - "DTO mapping"
  - "cache policy"
  - "transport-safe return"

server_action_sequence:
  - "authenticate"
  - "authorize"
  - "Zod validate"
  - "load server/provider-backed state"
  - "perform transaction/integration work"
  - "write audit event where relevant"
  - "revalidate affected paths/tags"
  - "return typed ActionResult"

policies:
  create_vouch:
    actor: "payer"
    requires:
      - "authenticated user"
      - "payer readiness"
      - "setup gates satisfied"
    denies:
      - "client-authoritative fee"
      - "client-authoritative status"
      - "marketplace discovery dependency"
  accept_vouch:
    actor: "payee"
    requires:
      - "authenticated user"
      - "valid invitation access"
      - "self-acceptance denied"
      - "payee readiness"
    denies:
      - "release funds"
      - "confirm presence"
      - "override readiness gates"
      - "create dispute surface"
  confirm_presence:
    actor: "active participant"
    requires:
      - "authenticated user"
      - "active Vouch participant"
      - "Vouch is active"
      - "confirmation window is open"
      - "no previous confirmation for same participant"
    denies:
      - "duplicate confirmation"
      - "before-window confirmation"
      - "after-window confirmation"
      - "one-sided release"
      - "client-authoritative settlement"
  admin:
    actor: "admin"
    allows:
      - "observe safe status"
      - "view safe provider reference"
      - "view audit trail"
      - "view webhook event status"
      - "retry safe provider operations where contracts allow"
    denies:
      - "decide who is right"
      - "collect stories"
      - "collect screenshots"
      - "collect evidence"
      - "arbitrate disputes"
      - "manually award funds"
      - "force release funds"
      - "rewrite confirmation truth"
      - "edit confirmation timestamps"
      - "override deterministic resolution"

settlement_authz:
  release_requires:
    - "payer confirmation within window"
    - "payee confirmation within window"
    - "current Stripe PaymentIntent retrieved"
    - "provider state allows capture"
    - "idempotency key present"
  failure_resolution: "If both valid confirmations are absent, resolve to refund, void, or non-capture according to current provider state."
