version: 1
name: vouch-integrations-contract
authority: source-of-truth

stripe:
  role: payment_provider_rail
  sdk_allowed_only_under:
    - lib/integrations/stripe/*
  required_modules:
    - lib/integrations/stripe/client.ts
    - lib/integrations/stripe/config.ts
    - lib/integrations/stripe/connect.ts
    - lib/integrations/stripe/checkout.ts
    - lib/integrations/stripe/payment-intents.ts
    - lib/integrations/stripe/refunds.ts
    - lib/integrations/stripe/status-map.ts
    - lib/integrations/stripe/webhook-events.ts
  canonical_payment_model:
    checkout: true
    manual_capture_payment_intent: true
    destination_charge_style_connect_settlement: true
    application_fee: true
    retrieve_before_settlement: true
    webhook_reconciliation: true
  forbidden_models:
    - direct_charge_as_canonical_vouch_flow
    - invoice_as_canonical_vouch_flow
    - product_price_catalog_for_individual_vouches
    - immediate_capture_at_authorization
    - manual_payout_escape_hatch
    - off_platform_settlement_instruction
  required_environment:
    - STRIPE_SECRET_KEY
    - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    - STRIPE_WEBHOOK_SECRET
  required_operations:
    - create_connected_account
    - create_connected_account_onboarding_link
    - create_connected_account_update_link
    - create_vouch_checkout_session
    - create_vouch_payment_intent
    - retrieve_payment_intent
    - capture_confirmed_vouch_payment
    - cancel_unconfirmed_vouch_payment
    - refund_captured_vouch_payment
    - verify_stripe_webhook_event
    - process_stripe_webhook_event
    - map_payment_intent_status
    - map_connected_account_readiness
  idempotency_required_for:
    - connected_account_creation
    - checkout_session_creation
    - payment_intent_creation
    - payment_intent_capture
    - payment_intent_cancel
    - refund_creation
    - provider_retry
    - webhook_event_persistence
    - audit_transition_write
    - resolution_job_attempt
  retrieve_current_provider_state_before:
    - capture
    - cancel
    - void
    - refund
    - provider_retry
    - settlement_reconciliation
  webhook_events_minimum:
    - account.updated
    - setup_intent.succeeded
    - setup_intent.setup_failed
    - checkout.session.completed
    - checkout.session.expired
    - payment_intent.requires_capture
    - payment_intent.succeeded
    - payment_intent.canceled
    - payment_intent.payment_failed
    - refund.created
    - refund.updated
    - charge.refunded
  storage_rules:
    allowed:
      - provider_object_id
      - provider_event_id
      - provider_status
      - capability_summary
      - restriction_summary
      - amount_fields
      - currency
      - provider_timestamps
      - redacted_diagnostics
      - last_sync_timestamp
    forbidden:
      - raw_card_data
      - raw_bank_account_data
      - raw_identity_documents
      - full_stripe_payloads
      - sensitive_kyc_data
      - unredacted_webhook_bodies

clerk:
  role: authentication_provider
  required_modules:
    - lib/auth/clerk.ts
    - lib/auth/session.ts
    - lib/auth/user.ts
    - lib/auth/account.ts
    - lib/auth/webhooks.ts
    - lib/authz/vouch.ts
    - lib/authz/payment.ts
    - lib/authz/readiness.ts
  required_environment:
    - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    - CLERK_SECRET_KEY
    - CLERK_WEBHOOK_SIGNING_SECRET
    - NEXT_PUBLIC_CLERK_SIGN_IN_URL
    - NEXT_PUBLIC_CLERK_SIGN_UP_URL
    - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
    - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
  owns:
    - authentication
    - sessions
    - sign_in
    - sign_up
    - account_portal_auth_management
  does_not_own:
    - vouch_participation
    - settlement_eligibility
    - payment_readiness
    - payout_readiness
    - presence_confirmation_truth
    - terms_truth_without_db_persistence
  webhook_events_minimum:
    - user.created
    - user.updated
    - user.deleted
    - session.created
    - session.ended
  storage_rules:
    allowed:
      - clerk_user_id
      - primary_email
      - safe_display_name
      - avatar_url
      - verified_contact_flags
      - local_user_status
      - last_sync_timestamp
    forbidden:
      - raw_clerk_session_tokens
      - raw_oauth_tokens
      - raw_webhook_payloads
      - passwords
      - full_clerk_user_objects
      - unnecessary_provider_identity_data

webhooks:
  allowed_routes:
    - app/api/clerk/webhook-handler/route.ts
    - app/api/stripe/webhooks/route.ts
  handler_responsibilities:
    - read_raw_body
    - read_signature_headers
    - verify_provider_signature
    - construct_provider_event
    - delegate_processing
    - return_provider_compatible_response
  handler_forbidden:
    - inline_prisma_mutation
    - inline_settlement_logic
    - inline_user_sync_logic
    - inline_provider_reconciliation
    - page_dto_shaping
    - trusting_unverified_payloads
    - storing_raw_provider_payloads
  event_processing:
    unique_key: provider_plus_provider_event_id
    duplicate_delivery: acknowledge_without_mutation
    late_event: reconcile_only_valid_forward_movement
    unsupported_event: mark_ignored_and_acknowledge