name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://vouch:vouch@127.0.0.1:5432/vouch_ci
      DIRECT_DATABASE_URL: postgresql://vouch:vouch@127.0.0.1:5432/vouch_ci
      CONFIRMATION_CODE_SECRET: ci-confirmation-secret
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_WEBHOOK_SECRET: whsec_ci_clerk
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci_stripe
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
